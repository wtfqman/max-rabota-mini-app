services:
  postgres:
    image: postgres:16-alpine
    container_name: max-mini-app-bot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: max_mini_app_bot
      POSTGRES_USER: max_bot
      POSTGRES_PASSWORD: max_bot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U max_bot -d max_mini_app_bot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
